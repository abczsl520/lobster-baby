name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npx vitest run

  build-mac:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - name: Build & Package
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run build && npx electron-builder --mac --publish never
      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-release
          path: |
            release/*.dmg
            release/*.zip

  build-win:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - name: Build & Package
        run: npm run build && npx electron-builder --win --publish never
      - name: Generate latest.yml
        shell: bash
        run: |
          node -e "
          const fs = require('fs');
          const crypto = require('crypto');
          const path = require('path');
          const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
          const files = fs.readdirSync('release').filter(f => f.includes('setup') && f.endsWith('.exe'));
          if (!files.length) { console.error('No setup exe found'); process.exit(1); }
          const setupName = files[0];
          const setupPath = path.join('release', setupName);
          const buf = fs.readFileSync(setupPath);
          const sha512 = crypto.createHash('sha512').update(buf).digest('base64');
          const yml = [
            'version: ' + pkg.version,
            'files:',
            '  - url: ' + setupName,
            '    sha512: ' + sha512,
            '    size: ' + buf.length,
            'path: ' + setupName,
            'sha512: ' + sha512,
            'releaseDate: ' + JSON.stringify(new Date().toISOString()),
          ].join('\n') + '\n';
          fs.writeFileSync('release/latest.yml', yml);
          console.log('Generated latest.yml:');
          console.log(yml);
          "
      - name: Upload Win artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-release
          path: |
            release/*setup*.exe
            release/*portable*.exe
            release/latest.yml

  deploy:
    needs: [build-win]
    if: always() && needs.build-win.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install @aws-sdk/client-s3
      - uses: actions/download-artifact@v4
        with:
          name: win-release
          path: release
      - name: List artifacts
        run: ls -la release/
      - name: Deploy to Cloudflare R2
        env:
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT: https://7edcb15fb6531129f6fc07df1896d0f7.r2.cloudflarestorage.com
          R2_BUCKET: lobster-downloads
        run: |
          node -e "
          const { S3Client, PutObjectCommand } = require('@aws-sdk/client-s3');
          const fs = require('fs');
          const path = require('path');
          const client = new S3Client({
            region: 'auto',
            endpoint: process.env.R2_ENDPOINT,
            credentials: {
              accessKeyId: process.env.R2_ACCESS_KEY,
              secretAccessKey: process.env.R2_SECRET_KEY,
            },
          });
          async function upload(filePath, key, contentType) {
            const buf = fs.readFileSync(filePath);
            await client.send(new PutObjectCommand({
              Bucket: process.env.R2_BUCKET,
              Key: key,
              Body: buf,
              ContentType: contentType,
            }));
            console.log('✅ Uploaded', key, '(' + (buf.length/1024/1024).toFixed(1) + 'MB)');
          }
          (async () => {
            const files = fs.readdirSync('release');
            for (const f of files) {
              const ct = f.endsWith('.yml') ? 'text/yaml' : 'application/octet-stream';
              await upload(path.join('release', f), f, ct);
            }
            console.log('🎉 All files deployed to R2');
          })().catch(e => { console.error('❌', e.message); process.exit(1); });
          "

  release:
    needs: [build-mac, build-win]
    if: always() && (needs.build-mac.result == 'success' || needs.build-win.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - name: List artifacts
        run: ls -la release/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
